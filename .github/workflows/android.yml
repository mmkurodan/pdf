name: Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # JavaScript 製 action を Node.js 24 で実行する
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # app/build.gradle の release signingConfig が参照する値
  KEYSTORE_PASSWORD: 'micklab'
  KEY_ALIAS: 'mykey'
  KEY_PASSWORD: 'micklab'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # Node.js 24 対応版を使って廃止警告を回避する
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper (8.7)
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon --console=plain assembleDebug

      - name: Decode Keystore
        run: |
          # AGP が参照する app/ 配下へ keystore を復元する
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        # release.apk も生成し、同じ署名設定でビルドする
        run: ./gradlew --no-daemon --console=plain assembleRelease

      - name: Build Signed Release AAB
        # injected signing は使わず、app/build.gradle の署名設定を使う
        run: ./gradlew --no-daemon --console=plain bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
